# MCP Spine - Filesystem Server Test Config
# Usage: mcp-spine serve --config spine.toml

[spine]
log_level = "debug"
audit_db = "spine_audit.db"

# --- Downstream MCP Servers ---

[[servers]]
name = "filesystem"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "C:\\Users\\PC\\Desktop\\MCP (The Spine)"]
timeout_seconds = 120

# --- Semantic Routing (Stage 2) ---
# Disabled for testing - shows all tools
[routing]
max_tools = 20
always_include = ["spine_set_context"]
rerank = true
similarity_threshold = 0.3

# --- Schema Minification (Stage 3) ---
[minifier]
level = 0                            # Off for testing - see raw schemas

# --- State Guard (Stage 4) ---
[state_guard]
enabled = true
watch_paths = ["C:\\Users\\PC\\Desktop\\MCP (The Spine)"]
max_tracked_files = 50
max_pin_files = 10
ignore_patterns = [
    "**/.git/**",
    "**/node_modules/**",
    "**/__pycache__/**",
    "**/.venv/**",
    "**/*.pyc",
    "**/.DS_Store",
    "**/spine_audit.db",
    "**/.spine/**",
]

# --- Security ---
[security]
scrub_secrets_in_logs = true
scrub_secrets_in_responses = false
audit_all_tool_calls = true
global_rate_limit = 120
per_tool_rate_limit = 60

[security.path]
allowed_roots = ["C:\\Users\\PC\\Desktop\\MCP (The Spine)"]
denied_patterns = [
    "**/.env",
    "**/.env.*",
    "**/*.pem",
    "**/*.key",
    "**/.ssh/*",
    "**/.aws/*",
]
